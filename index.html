<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>부동산 매물 대시보드</title>

<style>
body {
    font-family: Arial;
    background:#f5f7fa;
    padding:20px;
    transition:0.3s;
}

.dark {
    background:#1e1e1e;
    color:white;
}

h1 { text-align:center; }

.controls {
    margin-bottom:20px;
    display:flex;
    flex-wrap: wrap;
    gap:10px;
}

input, select, button {
    padding:8px;
}

table {
    width:100%;
    border-collapse: collapse;
    background:white;
}

.dark table {
    background:#2c2c2c;
}

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th {
    background:#2c3e50;
    color:white;
    cursor:pointer;
}

.price { color:red; font-weight:bold; }

.star {
    cursor:pointer;
    font-size:18px;
}

</style>
</head>

<body>

<h1>🏢 부동산 매물 대시보드</h1>

<div class="controls">
    <input type="text" id="urlInput" placeholder="네이버 부동산 URL">
    <button onclick="loadFromURL()">불러오기</button>

    <input type="number" id="minPrice" placeholder="최소 가격(억)">
    <input type="number" id="maxPrice" placeholder="최대 가격(억)">

    <select id="areaFilter">
        <option value="">전체 면적</option>
        <option value="84">84㎡</option>
        <option value="59">59㎡</option>
    </select>

    <button onclick="renderTable()">검색</button>
    <button onclick="downloadCSV()">CSV 다운로드</button>
    <button onclick="toggleDark()">🌙 다크모드</button>
</div>

<div id="stats"></div>

<table>
<thead>
<tr>
<th>★</th>
<th onclick="sortTable('dong')">동</th>
<th onclick="sortTable('floor')">층</th>
<th onclick="sortTable('area')">면적</th>
<th onclick="sortTable('price')">가격</th>
<th>유형</th>
<th>부동산</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
let globalData = [];
let originalData = [];
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

function parsePrice(str){
    return parseInt((str||"").replace(/[^0-9]/g,''))||0;
}

function extractComplexNo(url){
    const m = url.match(/complexes\/(\d+)/);
    return m ? m[1] : null;
}

function loadFromURL(){
    const url = document.getElementById("urlInput").value;
    const c = extractComplexNo(url);

    if(!c){
        alert("잘못된 URL");
        return;
    }

    globalData = originalData.filter(x=>x.complexNo===c);

    let history = JSON.parse(localStorage.getItem("history")||"[]");
    history.unshift(url);
    localStorage.setItem("history", JSON.stringify(history.slice(0,5)));

    renderTable();
}

fetch('data.json?cache=' + new Date().getTime())
.then(r=>r.json())
.then(d=>{
    originalData = d;
    globalData = d;
    renderTable();
});

function renderTable(){
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML="";

    const min = document.getElementById("minPrice").value*10000||0;
    const max = document.getElementById("maxPrice").value*10000||Infinity;
    const area = document.getElementById("areaFilter").value;

    const filtered = globalData.filter(x=>{
        const p = parsePrice(x.price);
        return p>=min && p<=max && (!area||x.area.includes(area));
    });

    // 통계
    const prices = filtered.map(x=>parsePrice(x.price));
    const avg = prices.reduce((a,b)=>a+b,0)/ (prices.length||1);

    document.getElementById("stats").innerHTML =
        `총 ${filtered.length}개 | 평균 ${(avg/10000).toFixed(1)}억`;

    filtered.forEach(x=>{
        const isFav = favorites.includes(x.link);
        const row = `
        <tr>
            <td class="star" onclick="toggleFav('${x.link}')">
                ${isFav ? '⭐' : '☆'}
            </td>
            <td onclick="go('${x.link}')">${x.dong}</td>
            <td>${x.floor}</td>
            <td>${x.area}</td>
            <td class="price">${x.price}</td>
            <td>${x.type}</td>
            <td>${x.agent}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

function toggleFav(link){
    if(favorites.includes(link)){
        favorites = favorites.filter(x=>x!==link);
    } else {
        favorites.push(link);
    }
    localStorage.setItem("fav", JSON.stringify(favorites));
    renderTable();
}

function go(url){
    window.open(url);
}

function sortTable(key){
    globalData.sort((a,b)=>{
        if(key==="price") return parsePrice(a.price)-parsePrice(b.price);
        return (a[key]||"").localeCompare(b[key]||"");
    });
    renderTable();
}

function downloadCSV(){
    let csv = "동,층,면적,가격,유형,부동산\n";

    globalData.forEach(x=>{
        csv += `${x.dong},${x.floor},${x.area},${x.price},${x.type},${x.agent}\n`;
    });

    const blob = new Blob([csv]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "realestate.csv";
    a.click();
}

function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
