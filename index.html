<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>부동산 매물 대시보드</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
h1 { text-align:center; }

.controls {
    margin-bottom:20px;
    display:flex;
    gap:10px;
}

input, select {
    padding:8px;
}

table {
    width:100%;
    border-collapse: collapse;
    background:white;
}

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th {
    background:#2c3e50;
    color:white;
    cursor:pointer;
}

.price { color:red; font-weight:bold; }

tr:hover { background:#f1f1f1; }
</style>
</head>

<body>

<h1>🏢 부동산 매물 대시보드</h1>

<div class="controls">
    <input type="number" id="minPrice" placeholder="최소 가격(억)">
    <input type="number" id="maxPrice" placeholder="최대 가격(억)">

    <select id="areaFilter">
        <option value="">전체 면적</option>
        <option value="84">84㎡</option>
        <option value="59">59㎡</option>
    </select>

    <button onclick="renderTable()">검색</button>
</div>

<table>
<thead>
<tr>
<th onclick="sortTable('dong')">동</th>
<th onclick="sortTable('floor')">층</th>
<th onclick="sortTable('area')">면적</th>
<th onclick="sortTable('price')">가격</th>
<th>유형</th>
<th>부동산</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>
let globalData = [];

function parsePrice(priceStr) {
    if (!priceStr) return 0;
    return parseInt(priceStr.replace(/[^0-9]/g, ''));
}

fetch('data.json')
.then(res => res.json())
.then(data => {
    globalData = data;
    renderTable();
});

function renderTable() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    const min = document.getElementById("minPrice").value * 10000 || 0;
    const max = document.getElementById("maxPrice").value * 10000 || Infinity;
    const area = document.getElementById("areaFilter").value;

    const filtered = globalData.filter(item => {
        const price = parsePrice(item.price);
        return price >= min && price <= max &&
               (!area || item.area.includes(area));
    });

    filtered.forEach(item => {
        const row = `
        <tr onclick="window.open('${item.link}')">
            <td>${item.dong}</td>
            <td>${item.floor}</td>
            <td>${item.area}</td>
            <td class="price">${item.price}</td>
            <td>${item.type}</td>
            <td>${item.agent}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

function sortTable(key) {
    globalData.sort((a, b) => {
        if (key === "price") {
            return parsePrice(a.price) - parsePrice(b.price);
        }
        return (a[key] || "").localeCompare(b[key] || "");
    });
    renderTable();
}
</script>

</body>
</html>
